<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

<h1>Add Opportunity</h1>

<form method="POST">

    <input type="text"
           name="title"
           placeholder="Opportunity Title"
           required>

    <br><br>

    <input type="text"
           name="category"
           placeholder="Category"
           required>

    <br><br>

    <input type="date"
           name="deadline"
           required>

    <br><br>

    <button type="submit">
        Add Opportunity
    </button>

</form>

<br><br>

<a href="/admin">
    <button>
        Back to Dashboard
    </button>
</a>
