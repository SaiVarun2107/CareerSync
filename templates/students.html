<link rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}">

<h1>Student Applications</h1>

<table border="1">

<tr>
    <th>Name</th>
    <th>Email</th>
    <th>Opportunity</th>
    <th>Status</th>
</tr>

{% for s in students %}

<tr>
    <td>{{ s[0] }}</td>
    <td>{{ s[1] }}</td>
    <td>{{ s[2] }}</td>
    <td>{{ s[3] }}</td>
</tr>

{% endfor %}

</table>
